<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>咆帳本 🐾</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8956c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="咆帳本">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html{font-size:16px}
:root{
  --cream:#fdf6ee;--warm:#f5e6d3;--brown:#c8956c;--dark-brown:#7a4f2e;
  --caramel:#e8b87d;--soft-orange:#f2a65a;--paw-pink:#f4a0a0;--paw-light:#fde8e8;
  --green:#82c9a0;--green-light:#e6f7ed;--yellow:#f5d76e;--yellow-light:#fef9e1;
  --purple:#b09fd4;--purple-light:#f0ecfa;
  --text:#4a3728;--text-light:#6b4f3a;
  --shadow:0 4px 20px rgba(120,70,30,.12);--shadow-sm:0 2px 8px rgba(120,70,30,.08);
  --radius:20px;--radius-sm:12px
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;
  background-image:radial-gradient(circle at 10% 20%,rgba(232,184,125,.15) 0%,transparent 50%),
  radial-gradient(circle at 90% 80%,rgba(244,160,160,.12) 0%,transparent 50%)}

/* HEADER */
.header{background:linear-gradient(135deg,#c8956c 0%,#e8b87d 60%,#f4c48a 100%);
  padding:18px 20px 26px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:relative}
.logo{display:flex;align-items:center;gap:10px}
.logo-dog{font-size:38px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));animation:wagTail 2s ease-in-out infinite}
@keyframes wagTail{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.logo-text{font-family:'Nunito',sans-serif;font-weight:900;font-size:26px;color:white;
  text-shadow:0 2px 6px rgba(0,0,0,.15);letter-spacing:1px}
.logo-sub{font-size:11px;color:rgba(255,255,255,.85);font-weight:600;letter-spacing:2px;text-transform:uppercase}

/* Ledger bar */
.ledger-bar{display:flex;gap:8px;align-items:center;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.ledger-bar::-webkit-scrollbar{display:none}
.ledger-chip{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);color:white;
  padding:6px 16px;border-radius:100px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;white-space:nowrap;transition:all .2s;backdrop-filter:blur(4px);touch-action:manipulation}
.ledger-chip.active{background:white;color:var(--dark-brown);border-color:white;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.ledger-chip:hover:not(.active){background:rgba(255,255,255,.35)}
.ledger-add-btn{background:rgba(255,255,255,.2);border:2px dashed rgba(255,255,255,.6);color:white;
  width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;touch-action:manipulation}
.ledger-add-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.1)}

/* 本月存款 */
.savings-row{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
  border-radius:var(--radius-sm);padding:10px 14px;margin:12px 0 10px;
  display:flex;align-items:center;gap:14px;backdrop-filter:blur(6px)}
.savings-pig{font-size:30px;flex-shrink:0;animation:pigWiggle 3s ease-in-out infinite}
@keyframes pigWiggle{0%,100%{transform:rotate(-4deg) scale(1)}50%{transform:rotate(4deg) scale(1.08)}}
.savings-info{flex:1;min-width:0}
.savings-label{font-size:10px;color:rgba(255,255,255,.85);font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.savings-input-row{display:flex;align-items:baseline;gap:3px}
.savings-dollar{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:white;flex-shrink:0}
.savings-input{background:transparent;border:none;border-bottom:2px solid rgba(255,255,255,.45);
  font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;color:white;
  width:100%;outline:none;padding:0 2px;text-shadow:0 1px 3px rgba(0,0,0,.1);transition:border-color .2s}
.savings-input::placeholder{color:rgba(255,255,255,.4)}
.savings-input:focus{border-color:rgba(255,255,255,.9)}
.savings-input::-webkit-outer-spin-button,.savings-input::-webkit-inner-spin-button{-webkit-appearance:none}
.savings-hint{font-size:10px;color:rgba(255,255,255,.55);margin-top:2px}

/* Summary */
.summary-card{background:rgba(255,255,255,.25);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.4);border-radius:var(--radius);
  padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.summary-item{text-align:center;flex:1;min-width:0}
.summary-label{font-size:11px;color:rgba(255,255,255,.8);font-weight:700;
  letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.summary-value{font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(1rem,4vw,1.375rem);color:white;
  text-shadow:0 1px 4px rgba(0,0,0,.1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.summary-value.income{color:#c8f7d6}
.summary-value.expense{color:#ffe8e8}
.summary-divider{width:1px;background:rgba(255,255,255,.3);height:40px;flex-shrink:0}

/* MAIN */
.main{padding:20px 16px;max-width:480px;margin:0 auto}
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
.month-btn{width:36px;height:36px;border-radius:50%;border:none;background:white;
  box-shadow:var(--shadow-sm);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;touch-action:manipulation}
.month-btn:hover{transform:scale(1.1);box-shadow:var(--shadow)}
.month-btn:active{transform:scale(.95)}
.month-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:18px;
  color:var(--dark-brown);min-width:120px;text-align:center}
.settings-strip{display:flex;align-items:center;gap:8px;font-size:.8125rem;
  color:var(--text-light);margin-bottom:16px;font-weight:600}
.settings-strip select{border:2px solid var(--warm);border-radius:8px;padding:4px 8px;
  font-size:.8125rem;background:white;color:var(--text);font-family:'Noto Sans TC',sans-serif}

/* Add card */
.add-card{background:white;border-radius:var(--radius);padding:20px;
  margin-bottom:20px;box-shadow:var(--shadow);border:2px solid var(--warm)}
.add-card-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;
  color:var(--dark-brown);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.type-toggle{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:2px solid transparent;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;transition:all .2s;background:var(--warm);color:var(--text-light);touch-action:manipulation}
.type-btn.active.expense{background:var(--paw-light);border-color:var(--paw-pink);color:#d44}
.type-btn.active.income{background:var(--green-light);border-color:var(--green);color:#2a8a50}
.type-btn:active{transform:scale(.97)}
.voice-section{margin-bottom:14px}
.voice-btn{width:100%;padding:14px;border-radius:var(--radius-sm);
  border:2px dashed var(--caramel);background:var(--yellow-light);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:var(--dark-brown);
  transition:all .2s;touch-action:manipulation}
.voice-btn:hover{background:#fef5d0;border-color:var(--soft-orange)}
.voice-btn:active{transform:scale(.98)}
.voice-btn.recording{background:var(--paw-light);border-color:var(--paw-pink);
  border-style:solid;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(244,160,160,.4)}50%{box-shadow:0 0 0 8px rgba(244,160,160,0)}}
.mic-icon{font-size:24px}
.voice-text-display{margin-top:8px;padding:10px 14px;background:var(--warm);
  border-radius:var(--radius-sm);font-size:13px;color:var(--text);min-height:38px;display:none}
.voice-text-display.show{display:block}
.form-row{display:flex;gap:10px;margin-bottom:12px}
.form-group{flex:1}
.form-label{font-size:.75rem;font-weight:700;color:var(--text-light);
  letter-spacing:.5px;margin-bottom:6px;display:block}
.form-input{width:100%;padding:11px 14px;border:2px solid var(--warm);
  border-radius:var(--radius-sm);font-family:'Noto Sans TC',sans-serif;font-size:1rem;
  color:var(--text);background:var(--cream);transition:border-color .2s;outline:none;touch-action:manipulation}
.form-input:focus{border-color:var(--caramel);background:white}

/* Cat grid */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:8px;margin-bottom:14px}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;
  border-radius:var(--radius-sm);border:2px solid transparent;background:var(--warm);
  cursor:pointer;transition:all .18s;touch-action:manipulation}
.cat-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.cat-item:active{transform:scale(.95)}
.cat-item.selected{border-color:var(--caramel);background:var(--yellow-light);
  box-shadow:0 0 0 3px rgba(232,184,125,.25)}
.cat-emoji{font-size:28px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.1))}
.cat-name{font-family:'Nunito',sans-serif;font-weight:700;font-size:.75rem;
  color:var(--text-light);text-align:center;line-height:1.2;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.cat-item.add-cat{border:2px dashed var(--brown);background:white}
.cat-item.add-cat .cat-emoji{font-size:22px}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--brown),var(--soft-orange));
  color:white;border:none;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;
  font-weight:800;font-size:16px;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 15px rgba(200,149,108,.35);display:flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,149,108,.45)}
.submit-btn:active{transform:translateY(1px)}

/* Records */
.section-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;
  color:var(--dark-brown);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.paw-divider{text-align:center;font-size:12px;color:var(--text-light);letter-spacing:4px;margin:4px 0 12px}
.day-group{margin-bottom:16px}
.day-label{font-size:12px;font-weight:700;color:var(--text-light);letter-spacing:1px;
  margin-bottom:8px;display:flex;align-items:center;gap:8px}
.day-label::after{content:'';flex:1;height:1px;background:var(--warm)}
.record-item{background:white;border-radius:var(--radius-sm);padding:12px 14px;
  display:flex;align-items:center;gap:12px;margin-bottom:8px;box-shadow:var(--shadow-sm);
  border-left:4px solid transparent;transition:all .2s;cursor:pointer;touch-action:manipulation}
.record-item:hover{background:#fdf0e6;box-shadow:var(--shadow)}
.record-item:active{transform:scale(.99)}
.record-item.expense{border-left-color:var(--paw-pink)}
.record-item.income{border-left-color:var(--green)}
.record-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.record-icon-wrap.expense{background:var(--paw-light)}
.record-icon-wrap.income{background:var(--green-light)}
.record-info{flex:1;min-width:0}
.record-cat{font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:var(--text)}
.record-note{font-size:12px;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-amount{font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;flex-shrink:0}
.record-amount.expense{color:#d44}
.record-amount.income{color:#2a8a50}
.record-delete{background:none;border:none;font-size:16px;cursor:pointer;opacity:.3;
  transition:opacity .2s;padding:4px;touch-action:manipulation;flex-shrink:0}
.record-delete:hover{opacity:1}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-dog{font-size:60px;margin-bottom:12px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty-text{font-family:'Nunito',sans-serif;font-weight:700;font-size:15px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(74,55,40,.5);backdrop-filter:blur(4px);
  z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--cream);border-radius:var(--radius);padding:24px;
  width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:18px;
  color:var(--dark-brown);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-input{width:100%;padding:12px 14px;border:2px solid var(--warm);border-radius:var(--radius-sm);
  font-family:'Noto Sans TC',sans-serif;font-size:1rem;color:var(--text);
  background:white;outline:none;margin-bottom:12px;transition:border-color .2s}
.modal-input:focus{border-color:var(--caramel)}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;
  margin-bottom:16px;max-height:220px;overflow-y:auto}
.emoji-pick{font-size:24px;padding:6px;border-radius:8px;cursor:pointer;
  text-align:center;transition:all .15s;border:2px solid transparent;touch-action:manipulation}
.emoji-pick:hover{background:var(--warm);transform:scale(1.2)}
.emoji-pick.selected{background:var(--yellow-light);border-color:var(--caramel)}
.modal-actions{display:flex;gap:10px}
.modal-btn{flex:1;padding:12px;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;
  font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;border:none;touch-action:manipulation}
.modal-btn.cancel{background:var(--warm);color:var(--text-light)}
.modal-btn.confirm{background:linear-gradient(135deg,var(--brown),var(--soft-orange));color:white;
  box-shadow:0 3px 12px rgba(200,149,108,.3)}
.modal-btn:hover{transform:translateY(-1px)}
.modal-btn:active{transform:translateY(0)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--dark-brown);color:white;padding:12px 20px;border-radius:100px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;
  z-index:200;transition:transform .3s ease,opacity .3s ease;opacity:0;white-space:nowrap;box-shadow:var(--shadow)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Font Size FAB */
.size-fab{position:fixed;bottom:24px;right:16px;z-index:50;
  display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.size-fab-btn{width:48px;height:48px;border-radius:50%;border:none;background:var(--dark-brown);
  color:white;font-size:13px;font-weight:900;cursor:pointer;
  box-shadow:0 4px 16px rgba(120,70,30,.3);transition:transform .2s,background .2s;
  touch-action:manipulation;display:flex;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;letter-spacing:-0.5px}
.size-fab-btn:hover{background:#5c3a1e;transform:scale(1.05)}
.size-fab-btn:active{transform:scale(.95)}
.size-panel{background:white;border-radius:var(--radius-sm);padding:14px 16px;
  box-shadow:var(--shadow);display:none;flex-direction:column;gap:10px;
  border:2px solid var(--warm);min-width:220px;animation:slideUp .2s ease}
.size-panel.open{display:flex}
.size-panel-title{font-size:.75rem;font-weight:700;color:var(--text-light)}
.size-btn-group{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.size-btn{padding:10px 4px 8px;border:2px solid var(--warm);border-radius:10px;
  background:var(--cream);cursor:pointer;text-align:center;transition:all .18s;
  touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:3px}
.size-btn:hover{border-color:var(--caramel);background:var(--yellow-light)}
.size-btn.active{border-color:var(--brown);background:var(--yellow-light);
  box-shadow:0 0 0 2px rgba(200,149,108,.25)}
.size-btn-icon{font-family:'Nunito',sans-serif;font-weight:900;color:var(--dark-brown);line-height:1}
.size-btn-sub{font-size:10px;color:var(--text-light);font-weight:700;line-height:1}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

/* ===== 特大模式 (xlarge) ===== */
body.xlarge-mode .record-item{padding:18px 16px!important;margin-bottom:14px!important}
body.xlarge-mode .record-icon-wrap{width:54px;height:54px;font-size:28px!important;border-radius:16px!important}
body.xlarge-mode .record-cat{font-size:1rem!important;font-weight:800!important}
body.xlarge-mode .record-note{font-size:.875rem!important}
body.xlarge-mode .record-amount{font-size:1.125rem!important}
body.xlarge-mode .record-delete{font-size:20px!important;padding:8px!important;opacity:.5!important}
body.xlarge-mode .cat-item{padding:14px 8px!important;min-height:78px!important}
body.xlarge-mode .cat-emoji{font-size:34px!important}
body.xlarge-mode .cat-name{font-size:.8125rem!important}
body.xlarge-mode .day-label{font-size:.875rem!important;margin-bottom:10px!important}
body.xlarge-mode .form-input{padding:14px!important;font-size:1.0625rem!important}

/* ===== 老人模式 (elder) ===== */
body.elder-mode{background:#fff!important;color:#111!important}
body.elder-mode .header{background:linear-gradient(135deg,#5c3a1e 0%,#7a4f2e 60%,#9b6840 100%)!important}
body.elder-mode .summary-card{background:rgba(0,0,0,.4)!important;border-color:rgba(255,255,255,.5)!important}
body.elder-mode .summary-value{text-shadow:0 1px 0 rgba(0,0,0,.5)!important}
body.elder-mode .add-card{border-color:#5c3a1e!important}
body.elder-mode .record-item{padding:20px 16px!important;margin-bottom:14px!important;border-left-width:6px!important}
body.elder-mode .record-icon-wrap{width:58px;height:58px;font-size:30px!important;border-radius:16px!important}
body.elder-mode .record-cat{font-size:1.0625rem!important;font-weight:900!important;color:#111!important}
body.elder-mode .record-note{font-size:.9375rem!important;color:#333!important}
body.elder-mode .record-amount{font-size:1.25rem!important}
body.elder-mode .record-amount.expense{color:#c0000d!important}
body.elder-mode .record-amount.income{color:#006b30!important}
body.elder-mode .record-delete{font-size:26px!important;padding:12px!important;opacity:.7!important}
body.elder-mode .type-btn{padding:18px 12px!important;min-height:60px!important;font-size:.9375rem!important}
body.elder-mode .submit-btn{padding:20px!important;font-size:1.0625rem!important;min-height:64px!important}
body.elder-mode .month-btn{width:52px!important;height:52px!important;font-size:22px!important}
body.elder-mode .ledger-chip{padding:10px 22px!important;font-size:.9375rem!important}
body.elder-mode .cat-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))!important}
body.elder-mode .cat-item{padding:18px 8px!important;min-height:88px!important}
body.elder-mode .cat-emoji{font-size:36px!important}
body.elder-mode .cat-name{font-size:.875rem!important;font-weight:800!important;color:#111!important;white-space:normal!important;line-height:1.3!important;overflow:visible!important;text-overflow:unset!important}
body.elder-mode .form-input{padding:18px 16px!important;font-size:1.0625rem!important;border-width:3px!important;border-color:#7a4f2e!important;color:#111!important}
body.elder-mode .form-input:focus{border-color:#c8956c!important}
body.elder-mode .day-label{font-size:.9375rem!important;color:#333!important;margin-bottom:12px!important}
body.elder-mode .modal-btn{padding:18px!important;font-size:1rem!important;min-height:60px!important}
body.elder-mode .voice-btn{padding:20px!important;min-height:64px!important;font-size:1rem!important}
body.elder-mode .settings-strip select{padding:10px 12px!important;font-size:.9375rem!important;border-width:2px!important;border-color:#7a4f2e!important}

<body>

<header class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-dog">🐕</div>
      <div>
        <div class="logo-text">咆帳本</div>
        <div class="logo-sub">ROAR BUDGET</div>
      </div>
    </div>
  </div>
  <div class="ledger-bar" id="ledgerBar"></div>

  <!-- 本月存款 -->
  <div class="savings-row">
    <div class="savings-pig">🐷</div>
    <div class="savings-info">
      <div class="savings-label">本月存款</div>
      <div class="savings-input-row">
        <span class="savings-dollar">$</span>
        <input class="savings-input" id="savingsInput" type="number"
          placeholder="輸入金額" inputmode="decimal" oninput="saveSavings()">
      </div>
      <div class="savings-hint">僅記錄，不連動帳本</div>
    </div>
  </div>

  <!-- 收支結餘 -->
  <div class="summary-card">
    <div class="summary-item">
      <div class="summary-label">收入</div>
      <div class="summary-value income" id="summaryIncome">$0</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <div class="summary-label">支出</div>
      <div class="summary-value expense" id="summaryExpense">$0</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <div class="summary-label">結餘</div>
      <div class="summary-value" id="summaryBalance">$0</div>
    </div>
  </div>
</header>

<main class="main">
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">◀</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-btn" onclick="changeMonth(1)">▶</button>
  </div>
  <div class="settings-strip">
    <label>🗓 每月從</label>
    <select id="startDaySelect" onchange="saveSettings()"></select>
    <label>號開始計算</label>
  </div>
  <div class="add-card">
    <div class="add-card-title">✏️ 新增記錄</div>
    <div class="type-toggle">
      <button class="type-btn active expense" id="btnExpense" onclick="setType('expense')">🐾 支出</button>
      <button class="type-btn income" id="btnIncome" onclick="setType('income')">🦴 收入</button>
    </div>
    <div class="voice-section">
      <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
        <span class="mic-icon">🎤</span>
        <span id="voiceBtnText">說出你的花費，我來幫你記！</span>
      </button>
      <div class="voice-text-display" id="voiceDisplay"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">金額</label>
        <input class="form-input" id="amountInput" type="number" placeholder="0" min="0" inputmode="decimal">
      </div>
      <div class="form-group">
        <label class="form-label">備註</label>
        <input class="form-input" id="noteInput" type="text" placeholder="午餐…">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" id="dateInput" type="date">
      </div>
    </div>
    <label class="form-label">類別</label>
    <div class="cat-grid" id="catGrid"></div>
    <button class="submit-btn" onclick="addRecord()">🐾 記帳！</button>
  </div>
  <div class="section-title">
    <span>📋 本月記錄</span>
    <span style="font-size:12px;color:var(--text-light)" id="recordCount">0 筆</span>
  </div>
  <div class="paw-divider">🐾 · · · 🐾</div>
  <div id="recordList"></div>
</main>

<div class="modal-overlay" id="ledgerModal">
  <div class="modal">
    <div class="modal-title">📒 新增帳本</div>
    <input class="modal-input" id="ledgerNameInput" placeholder="帳本名稱（如：家庭帳、旅遊帳）">
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('ledgerModal')">取消</button>
      <button class="modal-btn confirm" onclick="confirmAddLedger()">新增 🐾</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <div class="modal-title">🐕 新增類別</div>
    <input class="modal-input" id="catNameInput" placeholder="類別名稱">
    <div style="font-size:12px;color:var(--text-light);margin-bottom:8px;font-weight:700;">選擇圖示：</div>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('catModal')">取消</button>
      <button class="modal-btn confirm" onclick="confirmAddCat()">新增 🦴</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Font Size FAB -->
<div class="size-fab">
  <div class="size-panel" id="sizePanel">
    <div class="size-panel-title">🔤 字體大小</div>
    <div class="size-btn-group">
      <button class="size-btn active" id="sz-normal" onclick="applySize(16,'normal')">
        <span class="size-btn-icon" style="font-size:15px">Aa</span>
        <span class="size-btn-sub">一般</span>
      </button>
      <button class="size-btn" id="sz-large" onclick="applySize(18,'large')">
        <span class="size-btn-icon" style="font-size:17px">Aa</span>
        <span class="size-btn-sub">大</span>
      </button>
      <button class="size-btn" id="sz-xlarge" onclick="applySize(20,'xlarge')">
        <span class="size-btn-icon" style="font-size:19px">Aa</span>
        <span class="size-btn-sub">特大</span>
      </button>
      <button class="size-btn" id="sz-elder" onclick="applySize(24,'elder')">
        <span class="size-btn-icon" style="font-size:20px">Aa</span>
        <span class="size-btn-sub">👴 老人</span>
      </button>
    </div>
  </div>
  <button class="size-fab-btn" onclick="toggleSizePanel()" title="字體大小">Aa</button>
</div>

<script>
// 130+ EMOJI POOL
const EMOJI_POOL = [
  // 狗狗系列
  '🐶','🐕','🦮','🐩','🐾','🦴','🎾','🐕‍🦺',
  // 可愛動物
  '🐱','🐈','🐇','🐹','🐭','🦊','🐻','🐼','🐨','🐯',
  '🦁','🐸','🐵','🙈','🙉','🙊','🐮','🐷','🐥','🐧',
  '🦆','🦋','🐢','🐠','🐳','🦄','🐙','🦀','🐝','🦔',
  '🦭','🦒','🦓','🐘','🦏','🐆','🐒','🦜','🦩','🐓',
  // 食物飲料（熱門）
  '🍔','🍕','🍣','🍜','🍱','🧋','☕','🍵','🥤',
  '🍰','🎂','🧁','🍩','🍪','🥐','🥖','🍦','🍧',
  '🧇','🥞','🍿','🥙','🌮','🍙','🥗','🥚','🍳',
  '🍉','🍇','🍓','🍑','🥭','🍋','🍒','🫐','🍫','🍬','🍭',
  '🍺','🍻','🥂','🍾','🥃','🧃','🫖',
  // 商務辦公
  '💼','📊','📈','📉','💻','🖥️','📱','📋','📌','✏️',
  '📁','🗂️','📎','🖊️','📝','💡','🔑','🔒','📞','📧',
  '🖨️','💾','📡','🔭','🔬','🏆','🥇','📣','🔔',
  // 生活居家
  '🏠','🛋️','🛁','🛌','🧹','🪴','🛒','🪥','🧴','🧺',
  '🪑','🪞','🧸','🪆','🕯️','🧨','🏮','🔧','🔨','🪛',
  // 娛樂趣味
  '🎮','🎲','🎯','🎨','🎸','🎤','🎵','🎶','📸','🎬',
  '📺','🎡','🎠','🎭','🤖','👾','🎪','🃏','🎰','🎻',
  '🥁','🎺','🎹','🎲','🧩','🪀','🪁','🎑',
  // 網路梗圖 ／ 可愛表情
  '🤣','😂','💀','👻','🤡','🤦','🤷','💅','🫠','🥹',
  '🫶','🤌','💪','🫡','🥸','🤩','😎','🤪','😴','🙃',
  '😤','🤯','🥳','😇','🤭','😈','👹','💩','🎃','🫣',
  '🥺','😩','🤑','😋','🤤','🫦','👁️','🫀','🧠',
  // 旅遊戶外
  '✈️','🏖️','🏔️','🗺️','🚗','🛵','🚲','🚀','🛸','⛵',
  '🏕️','🌋','🏜️','🌊','🌄','🎆','🎇','🎡','🗼','🗽',
  // 購物時尚
  '👗','👟','👜','💄','💍','🕶️','🧣','🎁','🛍️','👠',
  '👒','🎩','🧢','💎','👑','💌','🎀','🧦','👔','🥿',
  // 運動健身
  '⚽','🏀','🏋️','🧘','🏃','🚴','🏊','🎽','🥊','🤸',
  '⛷️','🏄','🧗','🥅','🎿','🏓','🏸','🤿',
  // 自然花草
  '🌸','🌺','🌻','🌹','🌷','🍀','🌿','🌵','🎋','🍁',
  '🌾','🌴','🪸','🍄','🌰','🪨','🌊','🌈','⭐','🌙',
  '☀️','❄️','🌸','🍂','💫','✨','🌟','🔥','💧','🌍',
];

const DEFAULT_CATS = [
  {id:'food',  emoji:'🐾',name:'餐飲'},
  {id:'daily', emoji:'🦴',name:'日用品'},
  {id:'trans', emoji:'🐕',name:'交通'},
  {id:'shop',  emoji:'🐩',name:'購物'},
  {id:'home',  emoji:'🏠',name:'住家'},
  {id:'health',emoji:'💊',name:'醫療'},
  {id:'fun',   emoji:'🎾',name:'娛樂'},
  {id:'learn', emoji:'📚',name:'學習'},
  {id:'pet',   emoji:'🐶',name:'寵物'},
  {id:'other', emoji:'✨',name:'其他'},
];

let state = {ledgers:['個人帳本'],activeLedger:'個人帳本',
  categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),records:[],settings:{startDay:1}};
let currentType='expense', selectedCatId='food', currentMonth=new Date();
let recognition=null, isRecording=false, selectedEmoji='🐾';

const STORE_KEY='woofBudget_v1';
const SAVINGS_KEY='woofSavings';

function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){}}
function load(){
  try{
    const d=localStorage.getItem(STORE_KEY);
    if(d){const s=JSON.parse(d);state={...state,...s};
      if(!state.categories||!state.categories.length) state.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));}
  }catch(e){}
}

// 本月存款
function saveSavings(){
  try{localStorage.setItem(SAVINGS_KEY,document.getElementById('savingsInput').value)}catch(e){}
}
function loadSavings(){
  try{const v=localStorage.getItem(SAVINGS_KEY);if(v!==null)document.getElementById('savingsInput').value=v;}catch(e){}
}

// 字體大小
const SIZE_MAP={normal:16,large:18,xlarge:20,elder:24};
function applySize(px,key){
  document.documentElement.style.fontSize=px+'px';
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('sz-'+key);
  if(btn)btn.classList.add('active');
  document.body.classList.remove('xlarge-mode','elder-mode');
  if(key==='xlarge')document.body.classList.add('xlarge-mode');
  if(key==='elder')document.body.classList.add('elder-mode');
  try{localStorage.setItem('woofFontSize',key)}catch(e){}
}
function initSize(){
  try{const s=localStorage.getItem('woofFontSize');if(s&&SIZE_MAP[s])applySize(SIZE_MAP[s],s);}catch(e){}
}
function toggleSizePanel(){document.getElementById('sizePanel').classList.toggle('open')}

function init(){
  initSize(); load(); loadSavings();
  fillStartDaySelect();
  document.getElementById('dateInput').value=todayStr();
  renderAll();
}
function fillStartDaySelect(){
  const sel=document.getElementById('startDaySelect'); sel.innerHTML='';
  for(let i=1;i<=28;i++){const o=document.createElement('option');
    o.value=i;o.textContent=i;if(i===state.settings.startDay)o.selected=true;sel.appendChild(o);}
}
function saveSettings(){state.settings.startDay=parseInt(document.getElementById('startDaySelect').value);save();renderSummary();renderRecords();}
function todayStr(){return new Date().toISOString().split('T')[0]}
function renderAll(){renderLedgerBar();renderCatGrid();renderSummary();renderRecords();updateMonthLabel();}

function renderLedgerBar(){
  const bar=document.getElementById('ledgerBar'); bar.innerHTML='';
  state.ledgers.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='ledger-chip'+(name===state.activeLedger?' active':'');
    btn.textContent=name; btn.onclick=()=>{state.activeLedger=name;save();renderAll();};
    bar.appendChild(btn);
  });
  const add=document.createElement('button');
  add.className='ledger-add-btn';add.innerHTML='+';add.title='新增帳本';
  add.onclick=()=>openModal('ledgerModal'); bar.appendChild(add);
}
function confirmAddLedger(){
  const name=document.getElementById('ledgerNameInput').value.trim();
  if(!name)return showToast('請輸入帳本名稱 🐾');
  if(state.ledgers.includes(name))return showToast('帳本名稱重複啦 🦴');
  state.ledgers.push(name);state.activeLedger=name;
  document.getElementById('ledgerNameInput').value='';
  save();closeModal('ledgerModal');renderAll();showToast('帳本新增成功 🎉');
}

function renderCatGrid(){
  const grid=document.getElementById('catGrid'); grid.innerHTML='';
  state.categories.forEach(cat=>{
    const item=document.createElement('div');
    item.className='cat-item'+(cat.id===selectedCatId?' selected':'');
    item.innerHTML=`<span class="cat-emoji">${cat.emoji}</span><span class="cat-name">${cat.name}</span>`;
    item.onclick=()=>{selectedCatId=cat.id;renderCatGrid();};
    grid.appendChild(item);
  });
  const add=document.createElement('div');
  add.className='cat-item add-cat';
  add.innerHTML=`<span class="cat-emoji">➕</span><span class="cat-name">新增</span>`;
  add.onclick=openCatModal; grid.appendChild(add);
}
function openCatModal(){
  selectedEmoji='🐾';
  document.getElementById('catNameInput').value='';
  const grid=document.getElementById('emojiGrid'); grid.innerHTML='';
  EMOJI_POOL.forEach(em=>{
    const d=document.createElement('div');
    d.className='emoji-pick'+(em===selectedEmoji?' selected':'');
    d.textContent=em;
    d.onclick=()=>{selectedEmoji=em;document.querySelectorAll('.emoji-pick').forEach(el=>el.classList.remove('selected'));d.classList.add('selected');};
    grid.appendChild(d);
  });
  openModal('catModal');
}
function confirmAddCat(){
  const name=document.getElementById('catNameInput').value.trim();
  if(!name)return showToast('請輸入類別名稱 🐾');
  const id='cat_'+Date.now();
  state.categories.push({id,emoji:selectedEmoji,name});
  selectedCatId=id; save();closeModal('catModal');renderCatGrid();showToast('類別新增成功 🎉');
}

function setType(t){
  currentType=t;
  document.getElementById('btnExpense').className='type-btn'+(t==='expense'?' active expense':'');
  document.getElementById('btnIncome').className ='type-btn'+(t==='income' ?' active income' :'');
}

function toggleVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){showToast('此瀏覽器不支援語音輸入 😢');return;}
  if(isRecording){recognition&&recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='zh-TW';recognition.continuous=false;recognition.interimResults=true;
  recognition.onstart=()=>{isRecording=true;document.getElementById('voiceBtn').classList.add('recording');document.getElementById('voiceBtnText').textContent='🔴 錄音中，說完請停頓…';};
  recognition.onresult=(e)=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    const disp=document.getElementById('voiceDisplay');disp.classList.add('show');disp.textContent='🎤 '+t;
    if(e.results[e.results.length-1].isFinal)parseVoiceText(t);
  };
  recognition.onerror=()=>{};
  recognition.onend=()=>stopVoice();
  recognition.start();
}
function stopVoice(){
  isRecording=false;
  document.getElementById('voiceBtn').classList.remove('recording');
  document.getElementById('voiceBtnText').textContent='說出你的花費，我來幫你記！';
}
async function parseVoiceText(text){
  showToast('🤖 AI 解析中…');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,
        system:`你是記帳助理，從口語句子解析記帳資訊，只回傳 JSON，格式：{"amount":數字,"note":"備註","type":"expense或income","catHint":"類別關鍵字"}。type 預設 expense。若找不到金額 amount 給 0。`,
        messages:[{role:'user',content:text}]})
    });
    const data=await res.json();
    const parsed=JSON.parse((data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
    if(parsed.amount)document.getElementById('amountInput').value=parsed.amount;
    if(parsed.note)document.getElementById('noteInput').value=parsed.note;
    if(parsed.type)setType(parsed.type);
    if(parsed.catHint)autoSelectCat(parsed.catHint);
    showToast('✅ 解析完成！確認後記帳');
  }catch(e){showToast('解析失敗，請手動輸入 🦴');}
}
function autoSelectCat(hint){
  const map={'餐':'food','飯':'food','吃':'food','飲':'food','咖啡':'food','便當':'food','超商':'food',
    '車':'trans','油':'trans','停車':'trans','捷運':'trans','公車':'trans','計程':'trans',
    '藥':'health','醫':'health','診':'health','書':'learn','課':'learn',
    '狗':'pet','貓':'pet','寵':'pet','購':'shop','買':'shop','衣':'shop',
    '房':'home','租':'home','水':'home','電':'home','電影':'fun','遊戲':'fun','玩':'fun',
    '薪':'income','收':'income','還':'income'};
  for(const [k,id] of Object.entries(map)){if(hint.includes(k)){selectedCatId=id;renderCatGrid();return;}}
}

function addRecord(){
  const amount=parseFloat(document.getElementById('amountInput').value);
  const note=document.getElementById('noteInput').value.trim();
  const date=document.getElementById('dateInput').value;
  if(!amount||amount<=0)return showToast('請輸入金額 🐾');
  if(!date)return showToast('請選擇日期 📅');
  state.records.unshift({id:Date.now(),ledger:state.activeLedger,type:currentType,amount,note,date,catId:selectedCatId});
  save();
  document.getElementById('amountInput').value='';
  document.getElementById('noteInput').value='';
  document.getElementById('voiceDisplay').classList.remove('show');
  renderSummary();renderRecords();showToast('記帳成功 🐾🎉');
}

function changeMonth(d){currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+d,1);updateMonthLabel();renderSummary();renderRecords();}
function updateMonthLabel(){document.getElementById('monthLabel').textContent=`${currentMonth.getFullYear()}年 ${currentMonth.getMonth()+1}月`;}
function getMonthRecords(){
  const sd=state.settings.startDay,y=currentMonth.getFullYear(),m=currentMonth.getMonth();
  const start=new Date(y,m,sd),end=new Date(y,m+1,sd);
  return state.records.filter(r=>r.ledger===state.activeLedger&&new Date(r.date)>=start&&new Date(r.date)<end);
}
function renderSummary(){
  const recs=getMonthRecords();
  const income=recs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const expense=recs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const balance=income-expense;
  document.getElementById('summaryIncome').textContent='$'+income.toLocaleString();
  document.getElementById('summaryExpense').textContent='$'+expense.toLocaleString();
  const el=document.getElementById('summaryBalance');
  el.textContent=(balance>=0?'+':'')+'$'+balance.toLocaleString();
  el.style.color=balance>=0?'#c8f7d6':'#ffe8e8';
}
function renderRecords(){
  const list=document.getElementById('recordList');
  const recs=getMonthRecords();
  document.getElementById('recordCount').textContent=recs.length+' 筆';
  if(!recs.length){list.innerHTML=`<div class="empty-state"><div class="empty-dog">🐶</div><div class="empty-text">還沒有記錄，快來記帳吧！</div></div>`;return;}
  const groups={};recs.forEach(r=>{if(!groups[r.date])groups[r.date]=[];groups[r.date].push(r);});
  const sorted=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  list.innerHTML='';
  sorted.forEach(date=>{
    const dg=document.createElement('div');dg.className='day-group';
    const dl=document.createElement('div');dl.className='day-label';
    const d=new Date(date+'T00:00:00');
    dl.textContent=`${date} (${'日一二三四五六'[d.getDay()]})`;
    dg.appendChild(dl);
    groups[date].forEach(r=>{
      const cat=state.categories.find(c=>c.id===r.catId)||{emoji:'✨',name:'其他'};
      const item=document.createElement('div');item.className=`record-item ${r.type}`;
      item.innerHTML=`
        <div class="record-icon-wrap ${r.type}">${cat.emoji}</div>
        <div class="record-info">
          <div class="record-cat">${cat.name}</div>
          <div class="record-note">${r.note||'無備註'}</div>
        </div>
        <div class="record-amount ${r.type}">${r.type==='income'?'+':'-'}$${r.amount.toLocaleString()}</div>
        <button class="record-delete" onclick="deleteRecord(${r.id},event)">🗑</button>`;
      dg.appendChild(item);
    });
    list.appendChild(dg);
  });
}
function deleteRecord(id,e){
  e.stopPropagation();state.records=state.records.filter(r=>r.id!==id);
  save();renderSummary();renderRecords();showToast('已刪除 🐾');
}

function openModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show');});
});
document.addEventListener('click',e=>{
  const fab=document.querySelector('.size-fab');
  if(fab&&!fab.contains(e.target))document.getElementById('sizePanel').classList.remove('open');
});

init();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>console.log('[PWA] registered:',r.scope))
      .catch(e=>console.warn('[PWA] failed:',e));
  });
}
</script>
